<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>合同管理系统 - 专业销售/采购双轨管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dce5ef 100%);
            min-height: 100vh;
            padding: 30px 28px 50px 28px;
        }

        .system-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .master-header {
            text-align: center;
            margin-bottom: 45px;
        }
        .master-header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0b2b3b, #1e5a7a, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .master-header p {
            color: #2c6079;
            font-weight: 500;
            margin-top: 8px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-bottom: 30px;
        }

        .module-card {
            background: rgba(255,255,255,0.96);
            border-radius: 36px;
            box-shadow: 0 20px 32px -12px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.6);
            overflow: hidden;
        }
        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px -16px rgba(0,0,0,0.25);
            background: white;
        }
        .card-header {
            padding: 20px 22px 12px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        .card-icon {
            width: 54px;
            height: 54px;
            background: #eef3fc;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .card-header h2 {
            font-size: 1.55rem;
            font-weight: 650;
            color: #1c4e6e;
        }
        .card-preview {
            padding: 16px 22px 22px 22px;
            font-size: 0.85rem;
            color: #4f6f8f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .enter-badge {
            background: #e9eff5;
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1f6392;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: #ffffff;
            width: 90%;
            max-width: 1400px;
            max-height: 85vh;
            border-radius: 44px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 28px;
            background: #f8fafd;
            border-bottom: 1px solid #e2edf7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1f4e6e;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #7f9cbb;
            width: 40px;
            height: 40px;
            border-radius: 40px;
        }
        .modal-body {
            padding: 24px 28px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 28px;
            background: #f9fbfd;
            border-top: 1px solid #e9f0f5;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        button {
            border: none;
            background: #2c6e9e;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary {
            background: #e2eaf1;
            color: #2c5c7c;
        }
        button.draft-btn {
            background: #f0ad4e;
            color: white;
        }
        button.edit-save-btn {
            background: #28a745;
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .form-row {
            margin-bottom: 14px;
        }
        .form-row label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #1f4662;
        }
        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 24px;
            border: 1.5px solid #d4e0ea;
            font-size: 0.9rem;
            background: #fff;
        }
        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .compact-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .compact-table th, .compact-table td {
            padding: 8px 6px;
            border-bottom: 1px solid #e2edf4;
            text-align: left;
        }
        .compact-table th {
            background: #f0f6fc;
            position: sticky;
            top: 0;
        }
        .compact-table input {
            width: 110px;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 0.7rem;
        }
        .compact-table input[type="date"] {
            width: 120px;
        }
        .scroll-area {
            max-height: 450px;
            overflow-y: auto;
            margin-top: 12px;
            border: 1px solid #e9edf2;
            border-radius: 20px;
        }
        .stat-badge {
            background: #ecf5fb;
            border-radius: 28px;
            padding: 10px 12px;
            margin-top: 16px;
            font-weight: 500;
            text-align: center;
        }
        .tab-buttons, .sub-tab {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2edf4;
            padding-bottom: 8px;
        }
        .tab-btn, .sub-tab-btn {
            background: transparent;
            color: #4f6f8f;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab-btn.active, .sub-tab-btn.active {
            background: #2c6e9e;
            color: white;
        }
        .tab-pane, .ledger-pane, .payment-pane {
            display: none;
        }
        .tab-pane.active-pane, .ledger-pane.active-pane, .payment-pane.active-pane {
            display: block;
        }
        .action-icon {
            background: #f0f2f5;
            color: #c76e6e;
            padding: 4px 12px;
            font-size: 0.7rem;
            width: auto;
            cursor: pointer;
            border-radius: 20px;
            border: none;
        }
        .draft-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 10px;
            justify-content: flex-end;
        }
        .overdue-badge {
            color: #d9534f;
            font-weight: bold;
        }
        .editable-input {
            background-color: #fff9e6;
            border: 1px solid #ffc107;
        }
        .save-btn-small {
            background: #28a745;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            border: none;
        }
        .search-box {
            background: white;
            padding: 16px;
            border-radius: 28px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d0dde8;
            border-radius: 32px;
            font-size: 0.9rem;
        }
        .search-box button {
            background: #2c6e9e;
            padding: 10px 28px;
            margin-left: 12px;
        }
        .result-header {
            font-size: 1rem;
            font-weight: 600;
            color: #1f4662;
            margin: 16px 0 8px 0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: #6c8db0;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f4e6e;
        }
        .stat-card .sub {
            font-size: 0.7rem;
            color: #8aa9c4;
            margin-top: 4px;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f4e6e;
            margin: 20px 0 12px 0;
            border-left: 4px solid #2c6e9e;
            padding-left: 12px;
        }
        .export-panel {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .date-range {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .date-range label {
            font-weight: 600;
            color: #1f4662;
        }
        .date-range input {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
        }
        @media (max-width: 860px) {
            .modules-grid { grid-template-columns: 1fr; }
            .form-grid-2 { grid-template-columns: 1fr; }
            .compact-table { font-size: 0.65rem; }
            .compact-table input { width: 85px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .date-range { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="system-container">
    <div class="master-header">
        <h1>📄 合同管理系统</h1>
        <p>父级管控中心 · 销售/采购双轨管理 · 应收应付完整账期管理</p>
    </div>
    <div class="modules-grid" id="modulesGrid"></div>
</div>

<div id="moduleModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">📌 模块名称</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="secondary" id="modalCloseFooter">关闭</button>
        </div>
    </div>
</div>

<script>
    // ======================= 持久化存储键名 ========================
    const STORAGE_KEYS = {
        SALE_CONTRACTS: 'saleContracts',
        PURCHASE_CONTRACTS: 'purchaseContracts',
        RECEIPT_RECORDS: 'receiptRecords',
        PAYMENT_RECORDS: 'paymentRecords',
        SUPPLIERS: 'suppliers',
        ATTACHMENTS: 'attachments'
    };

    // ======================= 数据结构 ========================
    let attachments = {};

    // 销售合同数据
    let saleContracts = [];

    // 采购合同数据
    let purchaseContracts = [];

    // 收款记录
    let receiptRecords = [];

    // 付款记录
    let paymentRecords = [];

    // 供应商数据
    let suppliers = [];

    // 从 localStorage 加载数据
    function loadDataFromStorage() {
        try {
            const savedSale = localStorage.getItem(STORAGE_KEYS.SALE_CONTRACTS);
            if (savedSale) saleContracts = JSON.parse(savedSale);
            const savedPurchase = localStorage.getItem(STORAGE_KEYS.PURCHASE_CONTRACTS);
            if (savedPurchase) purchaseContracts = JSON.parse(savedPurchase);
            const savedReceipt = localStorage.getItem(STORAGE_KEYS.RECEIPT_RECORDS);
            if (savedReceipt) receiptRecords = JSON.parse(savedReceipt);
            const savedPayment = localStorage.getItem(STORAGE_KEYS.PAYMENT_RECORDS);
            if (savedPayment) paymentRecords = JSON.parse(savedPayment);
            const savedSuppliers = localStorage.getItem(STORAGE_KEYS.SUPPLIERS);
            if (savedSuppliers) suppliers = JSON.parse(savedSuppliers);
            const savedAttachments = localStorage.getItem(STORAGE_KEYS.ATTACHMENTS);
            if (savedAttachments) attachments = JSON.parse(savedAttachments);
        } catch (e) {
            console.error('加载数据失败', e);
        }
    }

    // 保存所有数据到 localStorage
    function saveAllDataToStorage() {
        try {
            localStorage.setItem(STORAGE_KEYS.SALE_CONTRACTS, JSON.stringify(saleContracts));
            localStorage.setItem(STORAGE_KEYS.PURCHASE_CONTRACTS, JSON.stringify(purchaseContracts));
            localStorage.setItem(STORAGE_KEYS.RECEIPT_RECORDS, JSON.stringify(receiptRecords));
            localStorage.setItem(STORAGE_KEYS.PAYMENT_RECORDS, JSON.stringify(paymentRecords));
            localStorage.setItem(STORAGE_KEYS.SUPPLIERS, JSON.stringify(suppliers));
            localStorage.setItem(STORAGE_KEYS.ATTACHMENTS, JSON.stringify(attachments));
        } catch (e) {
            console.error('保存数据失败', e);
        }
    }

    // 在每次数据修改后调用此函数
    function persistData() {
        saveAllDataToStorage();
    }

    // 包装数组操作，自动持久化（可选，但为了不侵入代码，我们在所有修改数据的地方手动调用 persistData）
    // 为了简单，我们在每个数据变更后调用 persistData()

    // ======================= 工具函数 ========================
    function updateSaleSeq() { saleContracts.forEach((item, idx) => { item.seq = idx + 1; }); }
    function updatePurchaseSeq() { purchaseContracts.forEach((item, idx) => { item.seq = idx + 1; }); }

    // 计算逾期天数
    function calcOverdueDays(dueDate) {
        if (!dueDate) return 0;
        const today = new Date();
        const due = new Date(dueDate);
        if (due >= today) return 0;
        const diffTime = today - due;
        return Math.floor(diffTime / (1000 * 60 * 60 * 24));
    }

    // 获取合同已收金额
    function getReceivedAmount(contractId) {
        return receiptRecords.filter(r => r.contractId === contractId).reduce((sum, r) => sum + r.amount, 0);
    }

    // 获取合同已付金额
    function getPaidAmount(contractId) {
        return paymentRecords.filter(p => p.contractId === contractId).reduce((sum, p) => sum + p.amount, 0);
    }

    let currentActiveModule = null;

    function renderMainGrid() {
        const grid = document.getElementById('modulesGrid');
        const modules = [
            { key: 'contractEntry', title: '📝 合同录入', desc: '销售/采购合同 + 草稿缓存', icon: '📄' },
            { key: 'contractLedger', title: '📋 合同台账', desc: '销售合同台账 / 采购合同台账', icon: '📚' },
            { key: 'supplierMgmt', title: '🏢 供应商管理', desc: '供应商档案管理', icon: '🤝' },
            { key: 'paymentReceipt', title: '💸 收付款管理', desc: '收款记录 / 付款记录', icon: '💰' },
            { key: 'receivable', title: '💰 应收账款', desc: '客户应收账期管理 · 可编辑已收金额/账期', icon: '📈' },
            { key: 'payable', title: '📉 应付账款', desc: '供应商应付账期管理 · 可编辑已付金额/账期', icon: '📉' },
            { key: 'ledgerQuery', title: '🔍 台账查询', desc: '关键字搜索合同/流水', icon: '🔎' },
            { key: 'analysisData', title: '📊 分析数据', desc: '销售/采购总数据流', icon: '📊' },
            { key: 'dataExport', title: '📎 数据导出', desc: '按年月日导出CSV', icon: '💾' }
        ];
        grid.innerHTML = '';
        modules.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div class="card-header"><div class="card-icon">${mod.icon}</div><h2>${mod.title}</h2></div>
                <div class="card-preview"><span>${mod.desc}</span><span class="enter-badge">点击进入 ➤</span></div>
            `;
            card.addEventListener('click', () => openModuleModal(mod.key, mod.title));
            grid.appendChild(card);
        });
    }

    function openModuleModal(moduleKey, title) {
        currentActiveModule = moduleKey;
        const modal = document.getElementById('moduleModal');
        document.getElementById('modalTitle').innerHTML = `📌 ${title}  ·  内部编辑`;
        const modalBody = document.getElementById('modalBody');
        let renderContent = '';
        switch (moduleKey) {
            case 'contractEntry': renderContent = renderContractEntryWithTabs(); break;
            case 'contractLedger': renderContent = renderContractLedgerWithTabs(); break;
            case 'supplierMgmt': renderContent = renderSupplierManagement(); break;
            case 'paymentReceipt': renderContent = renderPaymentReceiptWithTabs(); break;
            case 'receivable': renderContent = renderReceivableModuleEditable(); break;
            case 'payable': renderContent = renderPayableModuleEditable(); break;
            case 'ledgerQuery': renderContent = renderLedgerQueryModule(); break;
            case 'analysisData': renderContent = renderAnalysisModule(); break;
            case 'dataExport': renderContent = renderDataExportModule(); break;
        }
        modalBody.innerHTML = renderContent;
        modal.classList.add('active');
        attachModuleEvents(moduleKey);
    }

    // ========= 应收账款模块（支持编辑已收金额和账期）==========
    function renderReceivableModuleEditable() {
        if (saleContracts.length === 0) return '<div class="stat-badge">暂无销售合同数据</div>';
        
        let html = `<div class="scroll-area"><table class="compact-table"><thead>`
            + `   <th>合同名称</th><th>客户名称</th><th>合同编号</th><th>应收金额(¥)</th><th>已收金额(¥)</th><th>未收金额(¥)</th><th>账期</th><th>逾期天数</th><th>操作</th>`
            + `</thead><tbody>`;
        
        saleContracts.forEach(c => {
            const received = getReceivedAmount(c.id);
            const unReceived = c.contractAmount - received;
            const overdueDays = calcOverdueDays(c.dueReceiveTime);
            const overdueClass = overdueDays > 0 ? 'overdue-badge' : '';
            
            html += `<tr data-contract-id="${c.id}" data-original-received="${received}">
                <td style="text-align:center">${c.projectName || '-'}<\/td>
                <td style="text-align:center">${c.customerName || '-'}<\/td>
                <td style="text-align:center">${c.id}<\/td>
                <td style="text-align:right">${c.contractAmount.toLocaleString()}<\/td>
                <td style="text-align:center"><input type="number" class="edit-received-input" value="${received}" step="0.01" style="width:110px; background:#fff9e6;" placeholder="已收金额"><\/td>
                <td style="text-align:right" class="${unReceived > 0 ? 'overdue-badge' : ''}">${unReceived.toLocaleString()}<\/td>
                <td style="text-align:center"><input type="date" class="edit-due-date-input" value="${c.dueReceiveTime || ''}" style="width:120px; background:#fff9e6;"><\/td>
                <td style="text-align:center" class="${overdueClass}">${overdueDays > 0 ? overdueDays + '天' : '-'}<\/td>
                <td style="text-align:center"><button class="save-receivable-edit-btn" data-id="${c.id}" style="background:#28a745; padding:5px 14px; font-size:0.7rem; border-radius:20px;">💾 保存修改</button><\/td>
              <\/tr>`;
        });
        
        const totalReceivable = saleContracts.reduce((sum, c) => sum + (c.contractAmount - getReceivedAmount(c.id)), 0);
        html += `</tbody><\/table><\/div>`;
        return html;
    }

    // 保存应收账款编辑（更新已收金额和账期）
    function saveReceivableEdit(contractId) {
        const row = document.querySelector(`tr[data-contract-id="${contractId}"]`);
        if (!row) return;
        
        const newReceivedInput = row.querySelector('.edit-received-input');
        const newDueDateInput = row.querySelector('.edit-due-date-input');
        if (!newReceivedInput || !newDueDateInput) return;
        
        const newReceived = parseFloat(newReceivedInput.value);
        const newDueDate = newDueDateInput.value;
        
        if (isNaN(newReceived)) {
            alert('请输入有效的已收金额');
            return;
        }
        
        const contract = saleContracts.find(c => c.id === contractId);
        if (!contract) return;
        
        // 获取当前已收金额
        const currentReceived = getReceivedAmount(contractId);
        const diff = newReceived - currentReceived;
        
        // 更新账期（应回款时间）
        let dueDateChanged = false;
        if (newDueDate !== contract.dueReceiveTime) {
            contract.dueReceiveTime = newDueDate;
            dueDateChanged = true;
        }
        
        // 处理已收金额变动：生成收款记录
        if (Math.abs(diff) > 0.01) {
            const now = new Date().toISOString().slice(0, 10);
            const newRecord = {
                id: `R_EDIT_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
                date: now,
                contractId: contractId,
                contractName: contract.projectName,
                customerName: contract.customerName,
                paymentMethod: "手动调整",
                amount: diff,
                handler: "系统调整",
                isInvoiced: diff > 0 ? "已开票" : "冲销",
                invoiceDate: diff > 0 ? now : "",
                remark: `应收账款手动调整，变动金额: ${diff > 0 ? '+' : ''}${diff.toFixed(2)}元`
            };
            receiptRecords.push(newRecord);
            persistData();
            alert(`已收金额已更新，变动金额: ${diff > 0 ? '+' : ''}${diff.toFixed(2)}元，已生成调整记录`);
        } else if (dueDateChanged) {
            persistData();
            alert(`账期已更新为: ${newDueDate || '未设置'}`);
        } else {
            alert('未检测到任何修改');
            return;
        }
        
        // 刷新当前模块以显示最新数据
        refreshCurrentModule('receivable');
    }

    // ========= 应付账款模块（支持编辑已付金额和账期）==========
    function renderPayableModuleEditable() {

    // 保存应付账款编辑（更新已付金额和账期）
    function savePayableEdit(contractId) {
        const row = document.querySelector(`tr[data-contract-id="${contractId}"]`);
        if (!row) return;
        
        const newPaidInput = row.querySelector('.edit-paid-input');
        const newDueDateInput = row.querySelector('.edit-duepay-input');
        if (!newPaidInput || !newDueDateInput) return;
        
        const newPaid = parseFloat(newPaidInput.value);
        const newDueDate = newDueDateInput.value;
        
        if (isNaN(newPaid)) {
            alert('请输入有效的已付金额');
            return;
        }
        
        const contract = purchaseContracts.find(c => c.id === contractId);
        if (!contract) return;
        
        // 获取当前已付金额
        const currentPaid = getPaidAmount(contractId);
        const diff = newPaid - currentPaid;
        
        // 更新账期（应付截止时间）
        let dueDateChanged = false;
        if (newDueDate !== contract.duePayTime) {
            contract.duePayTime = newDueDate;
            dueDateChanged = true;
        }
        
        // 处理已付金额变动：生成付款记录
        if (Math.abs(diff) > 0.01) {
            const now = new Date().toISOString().slice(0, 10);
            const newRecord = {
                id: `P_EDIT_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
                date: now,
                contractId: contractId,
                contractName: contract.product,
                supplier: contract.manufacturer,
                paymentMethod: "手动调整",
                amount: diff,
                handler: "系统调整",
                isInvoiced: diff > 0 ? "已开票" : "冲销",
                invoiceDate: diff > 0 ? now : "",
                remark: `应付账款手动调整，变动金额: ${diff > 0 ? '+' : ''}${diff.toFixed(2)}元`
            };
            paymentRecords.push(newRecord);
            persistData();
            alert(`已付金额已更新，变动金额: ${diff > 0 ? '+' : ''}${diff.toFixed(2)}元，已生成调整记录`);
        } else if (dueDateChanged) {
            persistData();
            alert(`账期已更新为: ${newDueDate || '未设置'}`);
        } else {
            alert('未检测到任何修改');
            return;
        }
        
        // 刷新当前模块以显示最新数据
        refreshCurrentModule('payable');
    }

    // 执行搜索并渲染结果

        if (!keyword || keyword.trim() === '') {
            document.getElementById('searchResults').innerHTML = '<div class="stat-badge">暂无结果</div>';
            return;
        }
        keyword = keyword.trim().toLowerCase();
        
        function matches(obj, fields) {
            for (let field of fields) {

                if (val && String(val).toLowerCase().includes(keyword)) return true;
            }
            return false;

        const saleMatches = saleContracts.filter(c => matches(c, ['id', 'contractNo', 'projectName', 'customerName', 'contractType', 'remark']));

    // 导出CSV函数
    function exportDataToCSV() {
        const startDateStr = document.getElementById('exportStartDate').value;
        const endDateStr = document.getElementById('exportEndDate').value;
        if (!startDateStr || !endDateStr) {
            alert('请选择开始日期和结束日期');
            return;
        }
        const startDate = new Date(startDateStr);
        const endDate = new Date(endDateStr);
        endDate.setHours(23,59,59,999); // 包含结束日期的整天
        
        // 辅助函数：判断日期是否在范围内
        function isDateInRange(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            return d >= startDate && d <= endDate;
        }
        
        // 筛选销售合同（使用项目开展日期 startDate）
        const filteredSale = saleContracts.filter(c => isDateInRange(c.startDate));
        // 筛选采购合同（使用签订日期 signDate）
        const filteredPurchase = purchaseContracts.filter(c => isDateInRange(c.signDate));
        // 筛选收款记录（使用收款日期 date）
        const filteredReceipt = receiptRecords.filter(r => isDateInRange(r.date));
        // 筛选付款记录（使用付款日期 date）
        const filteredPayment = paymentRecords.filter(p => isDateInRange(p.date));
        
        // 构建CSV内容
        let csvRows = [];
        
        // 销售合同部分
        csvRows.push(['【销售合同】']);
        csvRows.push(['合同编号','合同类型','项目名称','客户名称','合同金额(¥)','已收金额(¥)','未收金额(¥)','项目开展日期','应回款时间','实际回款时间','备注']);
        filteredSale.forEach(c => {
            const received = getReceivedAmount(c.id);
            const unReceived = c.contractAmount - received;
            csvRows.push([
                c.id, c.contractType || '', c.projectName || '', c.customerName || '',
                c.contractAmount, received, unReceived,
                c.startDate || '', c.dueReceiveTime || '', c.actualReceiveTime || '', c.remark || ''
            ]);
        });
        if (filteredSale.length === 0) csvRows.push(['无符合条件的数据']);
        csvRows.push([]); // 空行分隔
        
        // 采购合同部分
        csvRows.push(['【采购合同】']);
        csvRows.push(['合同号','采购产品','供应商','总价(¥)','已付金额(¥)','未付金额(¥)','签订日期','应付账期','是否付款','备注']);
        filteredPurchase.forEach(c => {
            const paid = getPaidAmount(c.id);
            const unPaid = c.totalAmount - paid;
            csvRows.push([
                c.contractNo || c.id, c.product || '', c.manufacturer || '',
                c.totalAmount, paid, unPaid,
                c.signDate || '', c.duePayTime || '', c.isPaid || '', c.remark || ''
            ]);
        });
        if (filteredPurchase.length === 0) csvRows.push(['无符合条件的数据']);
        csvRows.push([]);
        
        // 收款记录部分
        csvRows.push(['【收款记录】']);
        csvRows.push(['日期','合同编号','合同名称','客户名称','收款方式','金额(¥)','经办人','是否已开票','开票日期','备注']);
        filteredReceipt.forEach(r => {
            csvRows.push([
                r.date, r.contractId, r.contractName, r.customerName, r.paymentMethod,
                r.amount, r.handler, r.isInvoiced, r.invoiceDate || '', r.remark || ''
            ]);
        });
        if (filteredReceipt.length === 0) csvRows.push(['无符合条件的数据']);
        csvRows.push([]);
        
        // 付款记录部分
        csvRows.push(['【付款记录】']);
        csvRows.push(['日期','合同编号','合同名称','供应商','付款方式','金额(¥)','经办人','是否已开票','开票日期','备注']);
        filteredPayment.forEach(p => {
            csvRows.push([
                p.date, p.contractId, p.contractName, p.supplier, p.paymentMethod,
                p.amount, p.handler, p.isInvoiced, p.invoiceDate || '', p.remark || ''
            ]);
        });
        if (filteredPayment.length === 0) csvRows.push(['无符合条件的数据']);
        
        // 转换为CSV字符串
        const csvContent = csvRows.map(row => row.map(cell => {
            // 处理包含逗号或换行符的单元格
            if (typeof cell === 'string' && (cell.includes(',') || cell.includes('"'))) {
                cell = cell.replace(/"/g, '""');
                cell = `"${cell}"`;
            }
            return cell;
        }).join(',')).join('\n');
        
        // 添加BOM以便正确显示中文
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `合同数据_${startDateStr}_至_${endDateStr}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        alert('导出成功！');
    }

    // 添加供应商
    function addSupplier() {
        let name = document.getElementById('supNameInp').value.trim();
        let contact = document.getElementById('supContactInp').value.trim();
        let phone = document.getElementById('supPhoneInp').value.trim();
        let status = document.getElementById('supStatusInp').value;
        let qualification = document.getElementById('supQualificationInp').value.trim();
        let scope = document.getElementById('supScopeInp').value.trim();
        let remark = document.getElementById('supRemarkInp').value.trim();
        
        if (!name) {
            alert("供应商名称必填");
            return;
        }
        
        suppliers.push({
            id: `SUP${Date.now()}`,
            name: name,
            contact: contact,
            phone: phone,
            status: status,
            qualification: qualification,
            scope: scope,
            remark: remark
        });
        persistData();
        alert("供应商已添加");
        refreshCurrentModule('supplierMgmt');
    }
    
    // 更新供应商
    function updateSupplier(supplierId) {
        const row = document.querySelector(`tr[data-supplier-id="${supplierId}"]`);
        if (!row) return;
        
        const supplier = suppliers.find(s => s.id === supplierId);
        if (!supplier) return;
        
        const newName = row.querySelector('.supplier-name')?.value.trim() || '';
        const newContact = row.querySelector('.supplier-contact')?.value.trim() || '';
        const newPhone = row.querySelector('.supplier-phone')?.value.trim() || '';
        const newStatus = row.querySelector('.supplier-status')?.value || '';
        const newQualification = row.querySelector('.supplier-qualification')?.value.trim() || '';
        const newScope = row.querySelector('.supplier-scope')?.value.trim() || '';
        const newRemark = row.querySelector('.supplier-remark')?.value.trim() || '';
        
        if (!newName) {
            alert("供应商名称不能为空");
            return;
        }
        
        supplier.name = newName;
        supplier.contact = newContact;
        supplier.phone = newPhone;
        supplier.status = newStatus;
        supplier.qualification = newQualification;
        supplier.scope = newScope;
        supplier.remark = newRemark;
        persistData();
        alert("供应商信息已更新");
        refreshCurrentModule('supplierMgmt');
    }
    
    // 删除供应商
    function deleteSupplier(supplierId) {
        if (confirm('确定删除该供应商吗？')) {
            const index = suppliers.findIndex(s => s.id === supplierId);
            if (index !== -1) {
                suppliers.splice(index, 1);
                persistData();
                alert("供应商已删除");
                refreshCurrentModule('supplierMgmt');
            }
        }
    }

    function saveAttachments(contractId, files, callback) { 
        if (!files || files.length === 0) { if(callback) callback(); return; } 
        let promises = []; 
        Array.from(files).forEach(file => { 
            let reader = new FileReader(); 
            let p = new Promise((resolve) => { 
                reader.onload = (e) => { 
                    if (!attachments[contractId]) attachments[contractId] = []; 
                    attachments[contractId].push({ id: Date.now() + "_" + file.name, name: file.name, size: file.size, type: file.type, dataURL: e.target.result }); 
                    resolve(); 
                }; 
                reader.readAsDataURL(file); 
            }); 
            promises.push(p); 
        }); 
        Promise.all(promises).then(() => { if(callback) callback(); persistData(); }); 
    }
